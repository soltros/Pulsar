---
version: '3.8'

networks:
  pulsar_net:
    driver: bridge

volumes:
  navidrome_data:

services:
  # ---------------------------------------------------
  # 1. Navidrome Backend (OpenSubsonic API Provider)
  # ---------------------------------------------------
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome_backend
    user: 1000:1000 # Adjust to match your host PUID/PGID
    # Binds Navidrome directly to host port 4533
    ports:
      - "4533:4533"
    environment:
      ND_SCANSCHEDULE: 1h
      ND_LOGLEVEL: info
      ND_SESSIONTIMEOUT: 24h
      ND_BASEURL: ""
      ND_ENABLESTARRED: "true"
    volumes:
      - navidrome_data:/data
      - ./sample_music:/music:ro # Strict Read-Only mount for media preservation
    networks:
      - pulsar_net
    restart: unless-stopped

  # ---------------------------------------------------
  # 2. Pulsar PWA Client
  # ---------------------------------------------------
  pulsar_client:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pulsar_web
    # Binds the static PWA web server directly to host port 8080
    ports:
      - "8080:80"
    networks:
      - pulsar_net
    restart: unless-stopped
    depends_on:
      navidrome:
        condition: service_started
