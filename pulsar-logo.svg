<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pulsarGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
    <linearGradient id="pulsarCore" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8b4fe" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="100" fill="#0d0e12" />
  
  <g transform="translate(256, 256) scale(16)">
    <!-- Inner Core -->
    <circle cx="0" cy="0" r="3" fill="url(#pulsarCore)" />
    
    <!-- Radiation Beams -->
    <path d="M0 -10v3m0 14v3M-10 0h3m14 0h3M-7.1 -7.1l2.1 2.1m10 10l2.1 2.1M-7.1 7.1l2.1 -2.1m10 -10l2.1 -2.1" stroke="url(#pulsarGradient)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    
    <!-- Orbital Rings -->
    <circle cx="0" cy="0" r="8" stroke="url(#pulsarGradient)" stroke-width="1.5" stroke-dasharray="4 4" />
    <circle cx="0" cy="0" r="11" stroke="#a855f7" stroke-width="1" opacity="0.2" />
  </g>
</svg>
