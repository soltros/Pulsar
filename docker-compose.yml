---
version: '3.8'

networks:
  pulsar_net:
    driver: bridge

services:
  # ---------------------------------------------------
  # Pulsar PWA Client
  # ---------------------------------------------------
  pulsar_client:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pulsar_web
    # Binds the static PWA web server directly to host port 8080
    ports:
      - "8080:80"
    networks:
      - pulsar_net
    restart: unless-stopped
