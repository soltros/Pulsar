server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for faster asset delivery
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Aggressive caching for immutable static assets
    location ~* \.(?:css|js|woff2?|eot|ttf|otf|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA/PWA Routing routing fallback
    location / {
        try_files $uri $uri/ /index.html;
        # Prevent caching of the index.html to ensure service worker updates
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
