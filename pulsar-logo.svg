<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pulsarGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="120" fill="#0d0e12" />
  
  <g transform="translate(256, 256) scale(18)">
    <!-- Outer Diamond -->
    <polygon points="0,-10 10,-1 0,10 -10,-1" stroke="url(#pulsarGradient)" stroke-width="1.2" stroke-linejoin="round" />
    
    <!-- Inner 3D Facets -->
    <polygon points="0,-10 5,-1 0,10 -5,-1" stroke="url(#pulsarGradient)" stroke-width="1.2" stroke-linejoin="round" />
    
    <!-- Vertical Core Line -->
    <line x1="0" y1="-10" x2="0" y2="10" stroke="url(#pulsarGradient)" stroke-width="1.2" stroke-linecap="round" />
    
    <!-- Horizontal Horizon Line -->
    <line x1="-10" y1="-1" x2="10" y2="-1" stroke="url(#pulsarGradient)" stroke-width="1.2" opacity="0.3" stroke-linecap="round" />
  </g>
</svg>
