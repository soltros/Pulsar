---
version: '3.8'

networks:
  pulsar_net:
    driver: bridge

services:
  # ---------------------------------------------------
  # Pulsar PWA Client
  # ---------------------------------------------------
  pulsar_client:
    image: ghcr.io/soltros/pulsar:latest
    container_name: pulsar_web
    # Use PORT from .env, or default to 80
    ports:
      - "${PULSAR_PORT:-80}:80"
    networks:
      - pulsar_net
    volumes:
      - pulsar_data:/app/data
      # Mount music directory if specified in .env, otherwise default to a dummy volume
      - ${MUSIC_DIR:-pulsar_data}:/app/media/music
    environment:
      - LASTFM_API_KEY=${LASTFM_API_KEY:-}
    restart: unless-stopped

volumes:
  pulsar_data:
