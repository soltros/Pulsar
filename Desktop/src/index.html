<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect to Pulsar</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #0d0e12;
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 2.5rem;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        h1 {
            margin-top: 0;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        input {
            width: 100%;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #f43f5e;
        }
        button {
            width: 100%;
            background: #f43f5e;
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #e11d48;
        }
        .loading {
            display: none;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 1rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container" id="login-container">
        <h1>Welcome to Pulsar</h1>
        <p>Enter the URL of your hosted Pulsar instance.</p>
        <form id="connect-form">
            <input type="url" id="instance-url" placeholder="https://pulsar.example.com" required>
            <button type="submit">Connect</button>
        </form>
        <div class="loading" id="loading-text">Connecting...</div>
    </div>

    <script>
        const savedUrl = localStorage.getItem('pulsar_instance_url');
        
        if (savedUrl) {
            document.getElementById('login-container').style.display = 'none';
            window.location.href = savedUrl;
        }

        document.getElementById('connect-form').addEventListener('submit', (e) => {
            e.preventDefault();
            let url = document.getElementById('instance-url').value.trim();
            
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }

            // Strip trailing slash
            if (url.endsWith('/')) {
                url = url.slice(0, -1);
            }

            localStorage.setItem('pulsar_instance_url', url);
            
            document.getElementById('connect-form').style.display = 'none';
            document.getElementById('loading-text').style.display = 'block';
            
            window.location.href = url;
        });
    </script>
</body>
</html>
