<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulsar Desktop</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #0d0e12;
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #titlebar {
            height: 30px;
            background: #16171d;
            user-select: none;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            -webkit-app-region: drag; /* This might not work in Tauri without tauri-drag-region */
        }
        .titlebar-button {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 40px;
            height: 30px;
            color: #ffffff;
            cursor: pointer;
            -webkit-app-region: no-drag;
            transition: background 0.2s;
        }
        .titlebar-button:hover {
            background: rgba(255,255,255,0.1);
        }
        #titlebar-close:hover {
            background: #e81123;
        }
        iframe {
            flex: 1;
            width: 100%;
            border: none;
            display: none;
        }
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 2.5rem;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        input {
            width: 100%;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 1rem;
            outline: none;
        }
        button {
            width: 100%;
            background: #f43f5e;
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }
        button:hover {
            background: #e11d48;
        }
    </style>
</head>
<body>
    <div id="titlebar" data-tauri-drag-region>
        <div class="titlebar-button" id="titlebar-minimize">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><path d="M0,4.5 L10,4.5 L10,5.5 L0,5.5 L0,4.5 Z"/></svg>
        </div>
        <div class="titlebar-button" id="titlebar-maximize">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><path d="M1,1 L9,1 L9,9 L1,9 L1,1 Z M2,2 L2,8 L8,8 L8,2 L2,2 Z"/></svg>
        </div>
        <div class="titlebar-button" id="titlebar-close">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><path d="M1.4,0 L5,3.6 L8.6,0 L10,1.4 L6.4,5 L10,8.6 L8.6,10 L5,6.4 L1.4,10 L0,8.6 L3.6,5 L0,1.4 L1.4,0 Z"/></svg>
        </div>
    </div>
    
    <div class="container" id="login-container">
        <div class="login-box">
            <h1 style="margin-top: 0;">Welcome to Pulsar</h1>
            <p style="color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-bottom: 2rem;">Enter the URL of your hosted instance.</p>
            <form id="connect-form">
                <input type="url" id="instance-url" placeholder="https://pulsar.example.com" required>
                <button type="submit">Connect</button>
            </form>
        </div>
    </div>

    <iframe id="webview" allow="autoplay; fullscreen; clipboard-read; clipboard-write; media-session" src=""></iframe>

    <script>
        const { Window } = window.__TAURI__ ? window.__TAURI__.window : { Window: null };
        const appWindow = Window ? Window.getCurrent() : null;

        document.getElementById('titlebar-minimize').addEventListener('click', () => {
            if (appWindow) appWindow.minimize();
        });
        document.getElementById('titlebar-maximize').addEventListener('click', () => {
            if (appWindow) appWindow.toggleMaximize();
        });
        document.getElementById('titlebar-close').addEventListener('click', () => {
            if (appWindow) {
                appWindow.close();
            } else {
                window.close();
            }
        });

        const savedUrl = localStorage.getItem('pulsar_instance_url');
        if (savedUrl) {
            loadInstance(savedUrl);
        }

        document.getElementById('connect-form').addEventListener('submit', (e) => {
            e.preventDefault();
            let url = document.getElementById('instance-url').value.trim();
            if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;
            if (url.endsWith('/')) url = url.slice(0, -1);
            
            localStorage.setItem('pulsar_instance_url', url);
            loadInstance(url);
        });

        function loadInstance(url) {
            document.getElementById('login-container').style.display = 'none';
            const webview = document.getElementById('webview');
            webview.style.display = 'block';
            webview.src = url;
        }
    </script>
</body>
</html>
